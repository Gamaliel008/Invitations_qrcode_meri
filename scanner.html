<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Remises de Cadeaux 2026 | JPC MERI</title>
<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:system-ui, -apple-system, Segoe UI, Roboto;
}

body{
  min-height:100vh;
  background:linear-gradient(135deg,#0b1220,#1e293b);
  color:white;
  padding:15px;
}

.container{
  max-width:800px;
  margin:0 auto;
}

.header{
  text-align:center;
  margin-bottom:25px;
}

h1{
  color:#facc15;
  font-size:24px;
  margin-bottom:5px;
}

.subtitle{
  font-size:14px;
  opacity:0.8;
}

.card{
  background:rgba(255,255,255,0.07);
  backdrop-filter:blur(16px);
  border-radius:20px;
  padding:22px;
  margin-bottom:20px;
}

input{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:none;
  font-size:16px;
  background:rgba(255,255,255,0.1);
  color:white;
  text-align:center;
  margin-bottom:15px;
}

input::placeholder{
  color:rgba(255,255,255,0.5);
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#facc15;
  font-weight:bold;
  font-size:16px;
  cursor:pointer;
  transition:transform 0.2s;
  color:#0f172a;
  margin-bottom:10px;
}

button:hover{
  transform:scale(0.98);
  background:#eab308;
}

button.secondary{
  background:#3b82f6;
  color:white;
}

button.secondary:hover{
  background:#2563eb;
}

button.danger{
  background:#ef4444;
  color:white;
}

button.danger:hover{
  background:#dc2626;
}

button.success{
  background:#22c55e;
  color:white;
}

.pin-card{
  background:linear-gradient(135deg,#1e293b,#0f172a);
  border-radius:16px;
  padding:20px;
  margin-top:20px;
  display:none;
  border:2px solid #facc15;
}

.pin-code{
  font-size:48px;
  font-weight:bold;
  color:#facc15;
  letter-spacing:10px;
  margin:15px 0;
  font-family:monospace;
}

#status{
  margin-top:15px;
  font-size:14px;
  padding:10px;
  border-radius:10px;
}

.success{ color:#86efac; background:rgba(34,197,94,0.1); }
.error{ color:#f87171; background:rgba(248,113,113,0.1); }
.info{ color:#facc15; background:rgba(250,204,21,0.1); }

.history-list{
  margin-top:15px;
  max-height:300px;
  overflow-y:auto;
}

.history-item{
  background:rgba(255,255,255,0.05);
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:10px;
}

.history-item.present{
  border-left:4px solid #22c55e;
}

.history-item.absent{
  border-left:4px solid #ef4444;
}

.history-nom{
  font-weight:bold;
  color:#facc15;
}

.history-code{
  font-family:monospace;
  font-size:12px;
  opacity:0.7;
}

.history-time{
  font-size:11px;
  opacity:0.6;
}

.history-status{
  font-size:12px;
  padding:4px 8px;
  border-radius:20px;
}

.status-present{
  background:rgba(34,197,94,0.2);
  color:#86efac;
}

.status-absent{
  background:rgba(248,113,113,0.2);
  color:#f87171;
}

.stats{
  display:flex;
  justify-content:space-between;
  margin-bottom:15px;
  gap:10px;
}

.stat-card{
  background:rgba(255,255,255,0.05);
  padding:10px;
  border-radius:12px;
  text-align:center;
  flex:1;
}

.stat-number{
  font-size:28px;
  font-weight:bold;
  color:#facc15;
}

.stat-label{
  font-size:11px;
  opacity:0.7;
}

h3{
  color:#facc15;
  font-size:18px;
  margin:15px 0 10px 0;
}

.search-box{
  display:flex;
  gap:10px;
  margin-bottom:15px;
}

.search-box input{
  margin-bottom:0;
  flex:1;
}

.search-box button{
  width:auto;
  padding:14px 20px;
  margin-bottom:0;
}
</style>
</head>

<body>
<div class="container">
<div class="header">
<h1>🎁 REMISES DE CADEAUX 2026 🎁</h1>
<div class="subtitle">👑 Admin - Gestion des invitations</div>
</div>

<div class="card">
  <div class="stats">
    <div class="stat-card">
      <div class="stat-number" id="totalInvites">0</div>
      <div class="stat-label">Total invités</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="presentCount">0</div>
      <div class="stat-label">Présents</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="absentCount">0</div>
      <div class="stat-label">Absents</div>
    </div>
  </div>
</div>

<div class="card">
  <h3>🔐 Générer un code PIN (à donner à l'invité)</h3>
  <input type="text" id="matricule" placeholder="Matricule (Ex: INVJPC1)" autocomplete="off">
  <button onclick="genererPIN()">🎲 Générer le code PIN à 4 chiffres</button>
  
  <div id="pinCard" class="pin-card">
    <div>📋 Code PIN à communiquer à :</div>
    <div id="pinNom" style="font-weight:bold; margin:5px 0"></div>
    <div class="pin-code" id="pinCode">----</div>
    <div>⚠️ Usage unique - L'invité devra entrer ce code sur sa page</div>
    <button onclick="copierPIN()" style="margin-top:10px; background:#22c55e; color:white;">📋 Copier le PIN</button>
  </div>
  <div id="status"></div>
</div>

<div class="card">
  <h3>✅ Valider l'entrée d'un invité</h3>
  <div class="search-box">
    <input type="text" id="scanCode" placeholder="Entrer le matricule (Ex: INVJPC1)" autocomplete="off">
    <button onclick="validerEntree()" class="success">✅ Valider entrée</button>
  </div>
  <div id="scanResult"></div>
</div>

<div class="card">
  <h3>📊 Historique des présences</h3>
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Rechercher un invité..." onkeyup="filtrerHistorique()">
    <button class="secondary" onclick="exporterHistorique()">📎 Exporter CSV</button>
  </div>
  <div id="historyList" class="history-list"></div>
  <button class="secondary" onclick="resetAllPIN()" style="margin-top:10px;">🔄 Réinitialiser tous les accès (après événement)</button>
</div>
</div>

<script>
// LISTE FINALE DES 79 INVITÉS (INVJPC1 à INVJPC79)
const invites = {
"INVJPC1":"Fr Emmanuel Bondo",
"INVJPC2":"Fr Tonny Bwanga",
"INVJPC3":"Fr Abel Dianda",
"INVJPC4":"Fr Sylas Mutetelenu",

"INVJPC34":"Sr Elisa Nzweba",
"INVJPC35":"Sr Rosette Lwaisha",
"INVJPC36":"Fr Gamaliel Muland",
"INVJPC37":"Sr Myriam Kalenga",
"INVJPC38":"Fr Jérémie Yumba",
"INVJPC39":"Fr Grace Alphonse",
"INVJPC40":"Sr Anne Kabwe",
"INVJPC41":"Fr Gad Mukalay",
"INVJPC42":"Sr L'or Kabwit",
"INVJPC43":"Sr Viviane Nduwa",

"INVJPC45":"Sr Alice Furah",
"INVJPC46":"Sr Acacia Percide Margueritte",
"INVJPC47":"Sr Marie Kasongo",

"INVJPC52":"Sr Abigaël Mulunda",
"INVJPC53":"Fr Josué Kabange",

"INVJPC57":"Fr David Iledephose",
"INVJPC58":"Fr Claude Botamali",

"INVJPC60":"Sr Adassa",

"INVJPC62":"Sr Sarah Mayeta",
"INVJPC63":"Fr Samuel Ngoy",
"INVJPC64":"Fr Crinovic Simbove",
"INVJPC65":"Fr Yann Kabuya",
"INVJPC66":"Sr Melissa",
"INVJPC67":"Fr Ephraïm",
"INVJPC68":"Fr Rubin",
"INVJPC69":"Fr John",
"INVJPC70":"Fr Manassé",
"INVJPC71":"Fr Espoir",
"INVJPC72":"Fr Matthew",
"INVJPC73":"Fr Joseph",
"INVJPC74":"Fr Parfait",
"INVJPC75":"Sr Augustine",
"INVJPC76":"Sr Syntiche",
"INVJPC77":"Sr Jenovic",
"INVJPC78":"Fr Bonheur Wa Tshimbu",
"INVJPC79":"Sr Mariam"
};

// Initialisation des stockages
let pins = JSON.parse(localStorage.getItem('invitationPins') || '{}');
let presences = JSON.parse(localStorage.getItem('presences') || '{}');

function mettreAJourStatistiques() {
  const total = Object.keys(invites).length;
  const presents = Object.keys(presences).length;
  document.getElementById("totalInvites").innerText = total;
  document.getElementById("presentCount").innerText = presents;
  document.getElementById("absentCount").innerText = total - presents;
  afficherHistorique();
}

function genererPIN() {
  const code = document.getElementById("matricule").value.trim().toUpperCase();
  const statusDiv = document.getElementById("status");
  const pinCard = document.getElementById("pinCard");
  
  if(!code){
    statusDiv.innerHTML = "<span class='error'>❌ Veuillez entrer un matricule</span>";
    pinCard.style.display = "none";
    return;
  }
  
  const nom = invites[code];
  if(!nom){
    statusDiv.innerHTML = `<span class='error'>❌ Matricule invalide : ${code}</span>`;
    pinCard.style.display = "none";
    return;
  }
  
  if(presences[code]){
    statusDiv.innerHTML = `<span class='error'>❌ ${nom} est déjà dans la salle ! Impossible de générer un nouveau PIN.</span>`;
    pinCard.style.display = "none";
    return;
  }
  
  // Générer un PIN aléatoire à 4 chiffres
  const pin = Math.floor(1000 + Math.random() * 9000).toString();
  
  // Sauvegarder le PIN
  pins[code] = {
    pin: pin,
    nom: nom,
    dateGeneration: new Date().toLocaleString(),
    utilise: false
  };
  localStorage.setItem('invitationPins', JSON.stringify(pins));
  
  // Afficher le PIN
  document.getElementById("pinNom").innerHTML = `${nom} (${code})`;
  document.getElementById("pinCode").innerHTML = pin;
  pinCard.style.display = "block";
  statusDiv.innerHTML = `<span class='success'>✅ PIN généré avec succès !</span>`;
  
  // Actualiser l'affichage
  afficherHistorique();
  
  // Faire disparaître la carte après 15 secondes
  setTimeout(() => {
    pinCard.style.display = "none";
  }, 15000);
}

function copierPIN() {
  const pinCode = document.getElementById("pinCode").innerText;
  navigator.clipboard.writeText(pinCode);
  const statusDiv = document.getElementById("status");
  statusDiv.innerHTML = `<span class='success'>✅ PIN ${pinCode} copié dans le presse-papier !</span>`;
  setTimeout(() => {
    if(statusDiv.innerHTML.includes("copié")) statusDiv.innerHTML = "";
  }, 2000);
}

function validerEntree() {
  const code = document.getElementById("scanCode").value.trim().toUpperCase();
  const resultDiv = document.getElementById("scanResult");
  
  if(!code){
    resultDiv.innerHTML = "<span class='error'>❌ Veuillez entrer un matricule</span>";
    return;
  }
  
  const nom = invites[code];
  if(!nom){
    resultDiv.innerHTML = `<span class='error'>❌ Matricule invalide : ${code}</span>`;
    return;
  }
  
  if(presences[code]){
    const presenceTime = presences[code];
    resultDiv.innerHTML = `<span class='error'>❌ ${nom} est DÉJÀ DANS LA SALLE !<br>Entrée enregistrée à : ${presenceTime}</span>`;
    return;
  }
  
  const now = new Date();
  const timeStr = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
  const dateStr = now.toLocaleDateString('fr-FR');
  presences[code] = `${dateStr} à ${timeStr}`;
  localStorage.setItem('presences', JSON.stringify(presences));
  
  resultDiv.innerHTML = `<span class='success'>✅ ENTRÉE VALIDÉE !<br>🎁 ${nom} (${code})<br>⏰ Heure : ${timeStr}</span>`;
  document.getElementById("scanCode").value = "";
  mettreAJourStatistiques();
  
  // Jouer un son de confirmation
  try {
    const audio = new Audio('data:audio/wav;base64,U3RlYWx0aCBhbmQgdGVzdCBzb3VuZA==');
    audio.play().catch(() => {});
  } catch(e) {}
}

function afficherHistorique() {
  const container = document.getElementById("historyList");
  const codes = Object.keys(invites);
  const searchTerm = document.getElementById("searchInput")?.value.toLowerCase() || "";
  
  const filtered = codes.filter(code => {
    const nom = invites[code];
    return nom.toLowerCase().includes(searchTerm) || code.toLowerCase().includes(searchTerm);
  });
  
  if(filtered.length === 0){
    container.innerHTML = "<div style='text-align:center;opacity:0.7;padding:20px;'>Aucun invité trouvé</div>";
    return;
  }
  
  container.innerHTML = filtered.map(code => {
    const nom = invites[code];
    const estPresent = presences[code];
    const pinInfo = pins[code];
    
    return `
      <div class="history-item ${estPresent ? 'present' : 'absent'}">
        <div>
          <div class="history-nom">${nom}</div>
          <div class="history-code">${code}</div>
          ${pinInfo ? `<div class="history-time">PIN: ${pinInfo.pin} - ${pinInfo.utilise ? '✅ Utilisé' : '⏳ Non utilisé'}</div>` : '<div class="history-time">⚠️ Aucun PIN généré</div>'}
        </div>
        <div>
          ${estPresent ? 
            `<div class="history-status status-present">✅ Présent depuis ${estPresent}</div>` : 
            `<div class="history-status status-absent">⏳ Non entré</div>`
          }
        </div>
      </div>
    `;
  }).join('');
}

function filtrerHistorique() {
  afficherHistorique();
}

function exporterHistorique() {
  let csv = "Matricule,Nom,Présent,Heure d'entrée,PIN généré,Statut PIN\n";
  const codes = Object.keys(invites);
  
  codes.forEach(code => {
    const nom = invites[code];
    const estPresent = presences[code] ? "OUI" : "NON";
    const heure = presences[code] || "";
    const pin = pins[code] ? pins[code].pin : "";
    const pinUtilise = pins[code] ? (pins[code].utilise ? "Utilisé" : "Non utilisé") : "Non généré";
    csv += `"${code}","${nom}","${estPresent}","${heure}","${pin}","${pinUtilise}"\n`;
  });
  
  const blob = new Blob(["\uFEFF" + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `remises_cadeaux_${new Date().toISOString().slice(0,19)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

function resetAllPIN() {
  if(confirm("⚠️ RÉINITIALISATION TOTALE !\n\nCela va :\n- Supprimer TOUS les codes PIN\n- Effacer TOUTES les présences\n- Remettre à zéro la salle\n\nContinuer ?")){
    pins = {};
    presences = {};
    localStorage.removeItem('invitationPins');
    localStorage.removeItem('presences');
    document.getElementById("pinCard").style.display = "none";
    document.getElementById("status").innerHTML = "<span class='info'>✅ Système réinitialisé !</span>";
    document.getElementById("scanResult").innerHTML = "";
    mettreAJourStatistiques();
  }
}

window.addEventListener('load', () => {
  mettreAJourStatistiques();
  
  document.getElementById("scanCode").addEventListener("keypress", (e) => {
    if(e.key === "Enter") validerEntree();
  });
  
  console.log("Admin prêt - Nombre d'invités:", Object.keys(invites).length);
});
</script>
</body>
</html>
