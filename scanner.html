<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scanner QR - Invitation</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:system-ui;
}

body{
  background:linear-gradient(135deg,#0b1220,#1e293b);
  color:white;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:15px;
}

.container{
  width:100%;
  max-width:500px;
  text-align:center;
}

h2{
  color:#facc15;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:white;
  font-weight:bold;
}

#reader{
  margin-top:15px;
  display:none;
}

.card{
  margin-top:20px;
  background:rgba(255,255,255,0.08);
  padding:15px;
  border-radius:12px;
  display:none;
}

#status{
  margin-top:10px;
  font-size:14px;
}
</style>

</head>

<body>

<div class="container">

<h2>📲 Scanner QR Invitation</h2>

<button onclick="startScanner()">Démarrer le scan</button>

<div id="reader"></div>

<div id="status">En attente...</div>

<div class="card" id="invitation">
<h3>🎉 Invitation Officielle</h3>
<p><strong id="nom">Invité</strong></p>

<p>
La Jeunesse Pour Christ de l’Église MERI / Paroisse Grain de Senevé vous convie à un moment de rafraîchissement, d’échange de cadeaux et de communion fraternelle.
</p>

<p>📅 Dimanche 14 Juin 2026</p>
<p>📍 Restaurant LACAZZA</p>
<p>⏰ 15h00</p>
</div>

</div>

<script>

/* 👥 LISTE INVITÉS (alignée avec index.html) */
const invites = {
"RC0001":"Fr Emmanuel Bondo",
"RC0002":"Fr Tonny Bwanga",
"RC0003":"Fr Abel Dianda",
"RC0004":"Fr Sylas Mutetelenu",
"RC0005":"Fr Louis Tshimanga",
"RC0067":"Fr Ephraïm"
};

let scannerInstance;

/* 📲 START SCANNER */
function startScanner(){

  document.getElementById("reader").style.display = "block";

  document.getElementById("status").innerText =
  "📷 Activation caméra...";

  scannerInstance = new Html5QrcodeScanner(
    "reader",
    { fps: 10, qrbox: 250 }
  );

  scannerInstance.render(onScanSuccess, onScanError);
}

/* ✔ SUCCESS */
function onScanSuccess(decodedText){

  let code = decodedText;

  try{
    // si QR contient URL
    if(decodedText.includes("code=")){
      let url = new URL(decodedText);
      code = url.searchParams.get("code");
    }

    document.getElementById("invitation").style.display = "block";

    document.getElementById("nom").innerText =
      invites[code] || "Invité inconnu";

    document.getElementById("status").innerText =
    "✔ QR détecté : " + code;

  }catch(e){
    document.getElementById("status").innerText =
    "❌ QR invalide";
  }
}

/* ❌ ERROR */
function onScanError(error){
  // silencieux volontaire (évite spam console mobile)
}

</script>

</body>
</html>
