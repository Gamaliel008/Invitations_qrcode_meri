<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Génération PIN | JPC MERI</title>
<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:system-ui, -apple-system, Segoe UI, Roboto;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#0b1220,#1e293b);
  color:white;
  padding:15px;
}

.container{
  width:100%;
  max-width:600px;
  background:rgba(255,255,255,0.07);
  backdrop-filter:blur(16px);
  border-radius:20px;
  padding:25px;
  text-align:center;
}

h1{
  color:#facc15;
  font-size:24px;
  margin-bottom:5px;
}

.subtitle{
  font-size:14px;
  opacity:0.8;
  margin-bottom:25px;
}

input{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:none;
  font-size:16px;
  background:rgba(255,255,255,0.1);
  color:white;
  text-align:center;
  margin-bottom:15px;
}

input::placeholder{
  color:rgba(255,255,255,0.5);
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#facc15;
  font-weight:bold;
  font-size:16px;
  cursor:pointer;
  transition:transform 0.2s;
  color:#0f172a;
  margin-bottom:10px;
}

button:hover{
  transform:scale(0.98);
  background:#eab308;
}

button.secondary{
  background:#3b82f6;
  color:white;
}

button.secondary:hover{
  background:#2563eb;
}

.pin-card{
  background:linear-gradient(135deg,#1e293b,#0f172a);
  border-radius:16px;
  padding:20px;
  margin-top:20px;
  display:none;
  border:2px solid #facc15;
}

.pin-code{
  font-size:48px;
  font-weight:bold;
  color:#facc15;
  letter-spacing:10px;
  margin:15px 0;
  font-family:monospace;
}

#status{
  margin-top:15px;
  font-size:14px;
  padding:10px;
  border-radius:10px;
}

.success{ color:#86efac; background:rgba(34,197,94,0.1); }
.error{ color:#f87171; background:rgba(248,113,113,0.1); }
.info{ color:#facc15; background:rgba(250,204,21,0.1); }

.pins-list{
  margin-top:20px;
  max-height:300px;
  overflow-y:auto;
  text-align:left;
}

.pin-item{
  background:rgba(255,255,255,0.05);
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  display:flex;
  justify-content:space-between;
  font-size:14px;
}

.pin-item span:first-child{ color:#facc15; font-weight:bold; }
.pin-item span:last-child{ font-family:monospace; font-size:18px; }

h3{
  margin:15px 0 10px 0;
  color:#facc15;
  font-size:18px;
}
</style>
</head>

<body>
<div class="container">
<h1>🔐 Admin - Générateur de Codes PIN</h1>
<div class="subtitle">Système d'invitation JPC MERI</div>

<input type="text" id="matricule" placeholder="Entrez le matricule (Ex: RC0001)" autocomplete="off">
<button onclick="genererPIN()">🎲 Générer le code PIN à 4 chiffres</button>

<div id="pinCard" class="pin-card">
  <div>📋 Code PIN pour :</div>
  <div id="pinNom" style="font-weight:bold; margin:5px 0"></div>
  <div class="pin-code" id="pinCode">----</div>
  <div>⚠️ À communiquer UNIQUEMENT à l'invité</div>
</div>

<div id="status"></div>

<hr style="margin:20px 0; opacity:0.2;">

<h3>📋 Codes PIN générés</h3>
<button class="secondary" onclick="afficherTousLesPIN()">🔄 Afficher tous les codes PIN</button>
<div id="pinsList" class="pins-list"></div>

<button onclick="resetAllPIN()" style="background:#ef4444; color:white; margin-top:15px;">🗑️ Réinitialiser tous les codes</button>
</div>

<script>
// Données des invités
const invites = {
"RC0001":"Fr Emmanuel Bondo",
"RC0002":"Fr Tonny Bwanga",
"RC0003":"Fr Abel Dianda",
"RC0004":"Fr Sylas Mutetelenu",
"RC0005":"Fr Louis Tshimanga",

"RC0013":"Fr Martin Fine",

"RC0015":"Fr Blaise Lwashi",
"RC0016":"Fr Alex Nawej",
"RC0017":"Maman Lydia Mukonda",
"RC0018":"Fr Lumière Mbuyi",
"RC0019":"Fr Roméo Lufungula",
"RC0020":"Fr Marc Kyabo",
"RC0021":"Fr Héritier Sangwa",
"RC0022":"Fr Jonathan Kabunda",
"RC0023":"Fr Ariel Kiyonge",
"RC0024":"Fr Donatien Kabala",
"RC0025":"Fr Sylvain Kumena",
"RC0026":"Sr Gloria Mbindi",
"RC0027":"Fr Misaël Meshack",
"RC0028":"Fr Esaïe Kabunda",
"RC0029":"Fr Tresor Ntambwe",

"RC0032":"Sr Arisia Yumba",

"RC0035":"Sr Rosette Lwaisha",

"RC0037":"Sr Myriam Kalenga",
"RC0038":"Fr Jérémie Yumba",
"RC0039":"Fr Grace Alphonse",
"RC0040":"Sr Anne Kabwe",
"RC0041":"Fr Gad Mukalay",
"RC0042":"Sr L'or Kabwit",
"RC0043":"Sr Viviane Nduwa",
"RC0044":"Sr Rebecca Itwamba",
"RC0045":"Sr Alice Furah",
"RC0046":"Sr Acacia Percide Margueritte",
"RC0047":"Sr Marie Kasongo",
"RC0048":"Sr Gloire Watshika",
"RC0049":"Fr Guy Kalala",
"RC0050":"Fr David Sangwa",
"RC0051":"Fr Josué Musans",
"RC0052":"Sr Abigaël Mulunda",
"RC0053":"Fr Josué Kabange",
"RC0054":"Sr Clémence Mujinga",
"RC0055":"Sr Esther Ngalula",
"RC0056":"Fr Christian Kambendja",
"RC0057":"Fr David Iledephose",
"RC0058":"Fr Claude Botamali",
"RC0059":"Sr Christine",
"RC0060":"Sr Adassa",
"RC0061":"Fr Victoire Kyungu",
"RC0062":"Sr Sarah Mayeta",
"RC0063":"Fr Samuel Ngoy",
"RC0064":"Fr Crinovic Simbove",
"RC0065":"Fr Yann Kabuya",
"RC0066":"Sr Melissa",
"RC0067":"Fr Ephraïm"
};

// Stockage des PINs
let pins = JSON.parse(localStorage.getItem('invitationPins') || '{}');

function genererPIN() {
  const code = document.getElementById("matricule").value.trim().toUpperCase();
  const statusDiv = document.getElementById("status");
  const pinCard = document.getElementById("pinCard");
  
  if(!code){
    statusDiv.innerHTML = "<span class='error'>❌ Veuillez entrer un matricule</span>";
    pinCard.style.display = "none";
    return;
  }
  
  const nom = invites[code];
  if(!nom){
    statusDiv.innerHTML = `<span class='error'>❌ Matricule invalide : ${code}</span>`;
    pinCard.style.display = "none";
    return;
  }
  
  // Générer un code PIN à 4 chiffres aléatoire
  const pin = Math.floor(1000 + Math.random() * 9000).toString();
  
  // Stocker le PIN
  pins[code] = {
    pin: pin,
    nom: nom,
    dateGeneration: new Date().toLocaleString(),
    utilise: false
  };
  localStorage.setItem('invitationPins', JSON.stringify(pins));
  
  // Afficher le PIN
  document.getElementById("pinNom").innerHTML = `${nom} (${code})`;
  document.getElementById("pinCode").innerHTML = pin;
  pinCard.style.display = "block";
  statusDiv.innerHTML = `<span class='success'>✅ PIN généré avec succès ! À communiquer à ${nom}</span>`;
  
  afficherTousLesPIN();
}

function afficherTousLesPIN() {
  const container = document.getElementById("pinsList");
  const codes = Object.keys(pins);
  
  if(codes.length === 0){
    container.innerHTML = "<div style='text-align:center;opacity:0.7;padding:10px;'>Aucun code PIN généré</div>";
    return;
  }
  
  container.innerHTML = codes.map(code => `
    <div class="pin-item">
      <span>${pins[code].nom} (${code})</span>
      <span style="color:#facc15;font-family:monospace">PIN: ${pins[code].pin}</span>
      <span style="font-size:11px;opacity:0.7">${pins[code].utilise ? '✅ Utilisé' : '⏳ En attente'}</span>
    </div>
  `).join('');
}

function resetAllPIN() {
  if(confirm("⚠️ ATTENTION : Cela supprimera TOUS les codes PIN générés. Continuer ?")){
    pins = {};
    localStorage.removeItem('invitationPins');
    document.getElementById("pinsList").innerHTML = "";
    document.getElementById("pinCard").style.display = "none";
    document.getElementById("status").innerHTML = "<span class='info'>🗑️ Tous les codes PIN ont été réinitialisés</span>";
  }
}

window.addEventListener('load', () => {
  afficherTousLesPIN();
});
</script>
</body>
</html>
