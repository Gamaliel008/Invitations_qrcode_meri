<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Scanner QR - Invitation MERI</title>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:system-ui;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#0b1220,#1e293b);
  color:white;
  padding:15px;
}

.container{
  width:100%;
  max-width:520px;
  text-align:center;
}

h2{
  color:#facc15;
  margin-bottom:10px;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  font-weight:bold;
  color:white;
  cursor:pointer;
  font-size:16px;
  transition:transform 0.2s, background 0.2s;
}

button:hover{
  background:#16a34a;
  transform:scale(0.98);
}

#reader{
  margin-top:15px;
  display:none;
  width:100%;
}

.card{
  margin-top:20px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(10px);
  padding:20px;
  border-radius:12px;
  display:none;
  animation: fade 0.3s ease-in-out;
  border:1px solid rgba(255,255,255,0.1);
}

.card h3{
  color:#facc15;
  margin-bottom:15px;
}

.card p{
  margin-top:10px;
  font-size:14px;
  line-height:1.6;
}

#status{
  margin-top:15px;
  font-size:14px;
  opacity:0.9;
  padding:10px;
  border-radius:8px;
  background:rgba(0,0,0,0.3);
}

.ok{ color:#86efac; }
.err{ color:#f87171; }

@keyframes fade{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}

#stopScanBtn{
  background:#ef4444;
  margin-top:10px;
  display:none;
}

#stopScanBtn:hover{
  background:#dc2626;
}
</style>

</head>

<body>

<div class="container">

<h2>📲 Scanner QR Invitation</h2>

<button id="startBtn" onclick="startScanner()">Démarrer le scan</button>
<button id="stopScanBtn" onclick="stopScanner()">Arrêter le scan</button>

<div id="reader"></div>

<div id="status">En attente du scan...</div>

<div class="card" id="invitation">
<h3>🎉 Invitation Officielle</h3>
<p><strong id="nom">Invité</strong></p>
<p style="margin-top:10px; font-size:14px; line-height:1.6;">
La Jeunesse Pour Christ de l'Église MERI / Paroisse Grain de Senevé
vous convie à un moment de rafraîchissement, d'échange de cadeaux et de communion fraternelle.
</p>
<p>📅 Dimanche 14 Juin 2026</p>
<p>📍 Restaurant LACAZZA</p>
<p>⏰ 15h00</p>
</div>

</div>

<script>

/* 👥 BASE DES INVITÉS (67 invités) */
const invites = {
"RC0001":"Fr Emmanuel Bondo",
"RC0002":"Fr Tonny Bwanga",
"RC0003":"Fr Abel Dianda",
"RC0004":"Fr Sylas Mutetelenu",

"RC0043":"Sr Viviane Nduwa",
"RC0044":"Sr Rebecca Itwamba",
"RC0045":"Sr Alice Furah",
"RC0046":"Sr Acacia Percide Margueritte",
"RC0047":"Sr Marie Kasongo",
"RC0048":"Sr Gloire Watshika",
"RC0049":"Fr Guy Kalala",
"RC0050":"Fr David Sangwa",
"RC0051":"Fr Josué Musans",
"RC0052":"Sr Abigaël Mulunda",
"RC0053":"Fr Josué Kabange",
"RC0054":"Sr Clémence Mujinga",
"RC0055":"Sr Esther Ngalula",
"RC0056":"Fr Christian Kambendja",
"RC0057":"Fr David Iledephose",
"RC0058":"Fr Claude Botamali",
"RC0059":"Sr Christine",
"RC0060":"Sr Adassa",
"RC0061":"Fr Victoire Kyungu",
"RC0062":"Sr Sarah Mayeta",
"RC0063":"Fr Samuel Ngoy",
"RC0064":"Fr Crinovic Simbove",
"RC0065":"Fr Yann Kabuya",
"RC0066":"Sr Melissa",
"RC0067":"Fr Ephraïm"
};

let html5QrCode;
let isScanning = false;

/* 🚀 START CAMERA */
async function startScanner(){
  const startBtn = document.getElementById("startBtn");
  const stopBtn = document.getElementById("stopScanBtn");
  const readerDiv = document.getElementById("reader");
  const statusDiv = document.getElementById("status");
  
  if(isScanning){
    statusDiv.innerHTML = "<span class='err'>⚠️ Scan déjà en cours</span>";
    return;
  }
  
  readerDiv.style.display = "block";
  statusDiv.innerHTML = "📷 Demande d'accès à la caméra...";
  
  try{
    html5QrCode = new Html5Qrcode("reader");
    
    const config = {
      fps: 10,
      qrbox: { width: 250, height: 250 },
      aspectRatio: 1.0
    };
    
    await html5QrCode.start(
      { facingMode: "environment" }, // caméra arrière par défaut
      config,
      onScanSuccess,
      onScanError
    );
    
    isScanning = true;
    startBtn.style.display = "none";
    stopBtn.style.display = "block";
    statusDiv.innerHTML = "📸 Caméra active - Scannez un QR code";
    
  } catch(err){
    console.error("Erreur démarrage caméra:", err);
    statusDiv.innerHTML = "<span class='err'>❌ Impossible d'accéder à la caméra. Vérifiez les permissions.</span>";
    readerDiv.style.display = "none";
  }
}

/* 🛑 STOP CAMERA */
async function stopScanner(){
  const startBtn = document.getElementById("startBtn");
  const stopBtn = document.getElementById("stopScanBtn");
  const readerDiv = document.getElementById("reader");
  const statusDiv = document.getElementById("status");
  
  if(html5QrCode && isScanning){
    try{
      await html5QrCode.stop();
      html5QrCode.clear();
    } catch(err){
      console.error("Erreur arrêt scan:", err);
    }
  }
  
  isScanning = false;
  readerDiv.style.display = "none";
  startBtn.style.display = "block";
  stopBtn.style.display = "none";
  statusDiv.innerHTML = "Scan arrêté. Cliquez sur 'Démarrer' pour recommencer.";
}

/* 🔍 EXTRACT CODE (QR OU URL) */
function extractCode(text){
  if(!text) return null;
  
  text = text.trim();
  
  // Si c'est une URL avec paramètre code=
  if(text.includes("code=")){
    try{
      const url = new URL(text);
      const code = url.searchParams.get("code");
      if(code) return code;
    } catch(e){
      // Si l'URL est mal formée, on essaye avec regex
      const match = text.match(/[?&]code=([^&]+)/);
      if(match) return match[1];
    }
  }
  
  // Sinon, retourner le texte tel quel (si c'est directement le code)
  return text;
}

/* ✔ SUCCESS */
function onScanSuccess(decodedText){
  const code = extractCode(decodedText);
  const nom = invites[code];
  
  const status = document.getElementById("status");
  const card = document.getElementById("invitation");
  
  card.style.display = "block";
  
  if(nom){
    document.getElementById("nom").innerText = nom;
    status.innerHTML = `<span class="ok">✅ Code valide : ${code}<br>Bienvenue ${nom} !</span>`;
    
    // Arrêter automatiquement le scan après un code valide
    setTimeout(() => {
      if(isScanning){
        stopScanner();
      }
    }, 2000);
    
  } else {
    document.getElementById("nom").innerText = "Invité non trouvé";
    status.innerHTML = `<span class="err">❌ Code invalide : ${code || "non reconnu"}</span>`;
  }
}

/* ❌ ERROR (silencieux pour éviter les spams) */
function onScanError(errorMessage){
  // Ne pas afficher les erreurs pour éviter de spammer la console
  // Les erreurs mineures sont normales pendant le scan
  if(errorMessage && errorMessage.includes("NotFoundException")){
    return; // Ignorer les erreurs de frame sans QR code
  }
  console.warn("Erreur scan:", errorMessage);
}

// Nettoyer le scanner si la page est fermée
window.addEventListener('beforeunload', () => {
  if(html5QrCode && isScanning){
    html5QrCode.stop().catch(() => {});
  }
});

</script>

</body>
</html>
