<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scanner QR</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
  margin:0;
  background:#0f172a;
  color:white;
  font-family:system-ui;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.box{
  width:100%;
  max-width:500px;
  text-align:center;
  padding:15px;
}

h2{
  color:#facc15;
}

button{
  width:100%;
  padding:12px;
  margin-bottom:15px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:white;
  font-weight:bold;
}

#reader{
  width:100%;
  display:none;
}
</style>
</head>

<body>

<div class="box">

<h2>📲 Scanner QR</h2>

<button onclick="startScanner()">Démarrer le scan</button>

<div id="reader"></div>

<p id="result">En attente...</p>

</div>

<script>

let scanner;

function startScanner(){

  document.getElementById("reader").style.display = "block";

  scanner = new Html5QrcodeScanner(
    "reader",
    { fps: 10, qrbox: 250 }
  );

  scanner.render(onScanSuccess, onScanError);
}

function onScanSuccess(decodedText){

  document.getElementById("result").innerText =
  "✔ QR détecté : " + decodedText;

  setTimeout(() => {
    window.location.href = decodedText;
  }, 700);
}

function onScanError(){}

</script>

</body>
</html>!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Scanner QR - Entrée Invitation</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:system-ui, -apple-system, Segoe UI, Roboto;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#0b1220,#1e293b,#0f172a);
  color:white;
  padding:20px;
}

.container{
  width:100%;
  max-width:500px;
  text-align:center;
}

h1{
  font-size:20px;
  margin-bottom:15px;
  color:#facc15;
}

#reader{
  width:100%;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

#result{
  margin-top:15px;
  font-size:14px;
  color:#e2e8f0;
  word-break:break-word;
}

.status{
  margin-top:10px;
  font-weight:bold;
}

.ok{
  color:#86efac;
}

.error{
  color:#f87171;
}
</style>

</head>

<body>

<div class="container">

<h1>📲 Scanner QR - Entrée</h1>

<div id="reader"></div>

<div id="result">En attente du scan...</div>
<div id="status"></div>

</div>

<script>
function onScanSuccess(decodedText) {

  document.getElementById("result").innerText =
  "📌 Code détecté : " + decodedText;

  document.getElementById("status").innerHTML =
  "<span class='ok'>✔ QR valide</span>";

  // 👉 Redirection automatique vers la page invitation
  setTimeout(() => {
    window.location.href = decodedText;
  }, 800);
}

function onScanFailure(error) {
  // silence volontaire
}

let scanner = new Html5QrcodeScanner(
  "reader",
  { fps: 10, qrbox: 250 }
);

scanner.render(onScanSuccess, onScanFailure);
</script>

</body>
