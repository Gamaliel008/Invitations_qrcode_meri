<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Scanner QR - Invitation MERI</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:system-ui;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#0b1220,#1e293b);
  color:white;
  padding:15px;
}

.container{
  width:100%;
  max-width:520px;
  text-align:center;
}

h2{
  color:#facc15;
  margin-bottom:10px;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  font-weight:bold;
  color:white;
  cursor:pointer;
}

#reader{
  margin-top:15px;
  display:none;
}

.card{
  margin-top:20px;
  background:rgba(255,255,255,0.08);
  padding:15px;
  border-radius:12px;
  display:none;
  animation: fade 0.3s ease-in-out;
}

#status{
  margin-top:10px;
  font-size:14px;
  opacity:0.9;
}

.ok{ color:#86efac; }
.err{ color:#f87171; }

@keyframes fade{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}
</style>

</head>

<body>

<div class="container">

<h2>📲 Scanner QR Invitation</h2>

<button onclick="startScanner()">Démarrer le scan</button>

<div id="reader"></div>

<div id="status">En attente du scan...</div>

<div class="card" id="invitation">

<h3>🎉 Invitation Officielle</h3>

<p><strong id="nom">Invité</strong></p>

<p style="margin-top:10px; font-size:14px; line-height:1.6;">
La Jeunesse Pour Christ de l’Église MERI / Paroisse Grain de Senevé
vous convie à un moment de rafraîchissement, d’échange de cadeaux et de communion fraternelle.
</p>

<p>📅 Dimanche 14 Juin 2026</p>
<p>📍 Restaurant LACAZZA</p>
<p>⏰ 15h00</p>

</div>

</div>

<script>

/* 👥 BASE IDENTIQUE À INDEX (67 invités) */

let scanner;

/* 🚀 START CAMERA */
function startScanner(){

  document.getElementById("reader").style.display = "block";
  document.getElementById("status").innerText = "📷 Activation caméra...";

  scanner = new Html5QrcodeScanner(
    "reader",
    { fps: 10, qrbox: 250 }
  );

  scanner.render(onScanSuccess, onScanError);
}

/* 🔍 EXTRACT CODE (QR OU URL) */
function extractCode(text){

  if(!text) return null;

  try{
    if(text.includes("code=")){
      return new URL(text).searchParams.get("code");
    }
  }catch(e){}

  return text.trim();
}

/* ✔ SUCCESS */
function onScanSuccess(decodedText){

  const code = extractCode(decodedText);
  const nom = invites[code];

  const status = document.getElementById("status");
  const card = document.getElementById("invitation");

  card.style.display = "block";

  if(nom){
    document.getElementById("nom").innerText = nom;
    status.innerHTML = `<span class="ok">✔ Code valide : ${code}</span>`;
  } else {
    document.getElementById("nom").innerText = "Invité inconnu";
    status.innerHTML = `<span class="err">❌ Code invalide : ${code}</span>`;
  }

  // stop scanner proprement
  scanner.clear().catch(()=>{});
}

/* ❌ ERROR (silencieux mobile) */
function onScanError(err){
  // rien
}

</script>

</body>
</html>
