<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Invitation QR - JPC MERI</title>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:system-ui, -apple-system, Segoe UI, Roboto;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#0b1220,#1e293b,#0f172a);
  color:#fff;
  padding:15px;
}

.card{
  width:100%;
  max-width:780px;
  background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.12);
  backdrop-filter:blur(16px);
  border-radius:20px;
  padding:22px;
  text-align:center;
}

h1{
  color:#facc15;
  font-size:22px;
  margin-bottom:10px;
}

.nom{
  font-size:18px;
  font-weight:700;
  margin:15px 0;
}

input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  margin-top:10px;
  font-size:14px;
}

.message{
  text-align:justify;
  line-height:1.7;
  color:#e2e8f0;
  font-size:14px;
}

.info{
  margin-top:18px;
  display:flex;
  flex-direction:column;
  gap:8px;
}

.box{
  background:rgba(255,255,255,0.08);
  padding:10px;
  border-radius:10px;
  font-size:14px;
}

button{
  margin-top:12px;
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#facc15;
  font-weight:bold;
  font-size:15px;
  cursor:pointer;
  transition:transform 0.2s, background 0.2s;
  color:#0f172a;
}

button:hover{
  background:#eab308;
  transform:scale(0.98);
}

#status{
  margin-top:12px;
  font-size:14px;
}

.error{ color:#f87171; }
.success{ color:#86efac; }

#qrBox{
  margin-top:20px;
  display:flex;
  justify-content:center;
}

#qrcodeList{
  margin-top:20px;
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
  max-height:400px;
  overflow-y:auto;
  padding:10px;
}

.qr-box{
  background:rgba(255,255,255,0.06);
  padding:10px;
  border-radius:12px;
  width:160px;
  text-align:center;
}

hr{
  margin:20px 0;
  opacity:0.2;
}

::-webkit-scrollbar{
  width:8px;
}

::-webkit-scrollbar-track{
  background:rgba(255,255,255,0.1);
  border-radius:10px;
}

::-webkit-scrollbar-thumb{
  background:#facc15;
  border-radius:10px;
}
</style>

</head>

<body>

<div class="card">

<h1>🎟️ Système d'Invitation JPC MERI</h1>

<!-- INPUT -->
<input id="matricule" placeholder="Entrez votre code (Ex: RC0001)">

<button onclick="chargerInvite()">🔎 Charger mon invitation</button>

<div class="nom">
Cher(e) <span id="nom">...</span>
</div>

<div class="message">
La Jeunesse Pour Christ de l'Église MERI / Paroisse Grain de Senevé
vous convie à un moment de rafraîchissement, d'échange de cadeaux et de communion fraternelle.
</div>

<div class="info">
<div class="box">📅 Dimanche 14 Juin 2026</div>
<div class="box">📍 Restaurant LACAZZA</div>
<div class="box">⏰ 15h00</div>
</div>

<!-- QR PERSONNEL -->
<button onclick="genererMonQR()">🎟️ Générer mon QR code personnel</button>
<div id="qrBox"></div>

<div id="status"></div>

<hr>

<!-- QR ADMIN -->
<button onclick="generateAllQR()">📦 Générer tous les QR codes (67 invités)</button>
<div id="qrcodeList"></div>

</div>

<script>
// Base URL du scanner (à modifier selon votre hébergement)
// Pour GitHub Pages, utilisez le lien de votre scanner
const BASE_URL = window.location.origin + window.location.pathname.replace(/[^/]*$/, '') + "scanner.html";

const invites = {
"RC0001":"Fr Emmanuel Bondo",
"RC0002":"Fr Tonny Bwanga",
"RC0003":"Fr Abel Dianda",
"RC0004":"Fr Sylas Mutetelenu",
"RC0005":"Fr Louis Tshimanga",
"RC0006":"Fr Aimerance Kazal",
"RC0007":"Sr Jolaine Mwika",
"RC0008":"Sr Julia yav",
"RC0009":"Fr Christian Okota",
"RC0010":"Fr Maurice Kasongo",
"RC0011":"Sr Allegresse Simbove",
"RC0012":"Sr Craintha Simbove",
"RC0013":"Fr Martin Fine",
"RC0014":"Sr Jireh Topele",
"RC0015":"Fr Blaise Lwashi",
"RC0016":"Fr Alex Nawej",
"RC0017":"Maman Lydia Mukonda",
"RC0018":"Fr Lumière Mbuyi",
"RC0019":"Fr Roméo Lufungula",
"RC0020":"Fr Marc Kyabo",
"RC0021":"Fr Héritier Sangwa",
"RC0022":"Fr Jonathan Kabunda",
"RC0023":"Fr Ariel Kiyonge",
"RC0024":"Fr Donatien Kabala",
"RC0025":"Fr Sylvain Kumena",
"RC0026":"Sr Gloria Mbindi",
"RC0027":"Fr Misaël Meshack",
"RC0028":"Fr Esaïe Kabunda",
"RC0029":"Fr Tresor Ntambwe",
"RC0030":"Fr Gamaliel Kalambo",
"RC0031":"Sr Sephora Yumba",
"RC0032":"Sr Arisia Yumba",
"RC0033":"Sr Julia Mbala",
"RC0034":"Sr Elisa Nzweba",
"RC0035":"Sr Rosette Lwaisha",
"RC0036":"Fr Gamaliel Muland",
"RC0037":"Sr Myriam Kalenga",
"RC0038":"Fr Jérémie Yumba",
"RC0039":"Fr Grace Alphonse",
"RC0040":"Sr Anne Kabwe",
"RC0041":"Fr Gad Mukalay",
"RC0042":"Sr L'or Kabwit",
"RC0043":"Sr Viviane Nduwa",
"RC0044":"Sr Rebecca Itwamba",
"RC0045":"Sr Alice Furah",
"RC0046":"Sr Acacia Percide Margueritte",
"RC0047":"Sr Marie Kasongo",
"RC0048":"Sr Gloire Watshika",
"RC0049":"Fr Guy Kalala",
"RC0050":"Fr David Sangwa",
"RC0051":"Fr Josué Musans",
"RC0052":"Sr Abigaël Mulunda",
"RC0053":"Fr Josué Kabange",
"RC0054":"Sr Clémence Mujinga",
"RC0055":"Sr Esther Ngalula",
"RC0056":"Fr Christian Kambendja",
"RC0057":"Fr David Iledephose",
"RC0058":"Fr Claude Botamali",
"RC0059":"Sr Christine",
"RC0060":"Sr Adassa",
"RC0061":"Fr Victoire Kyungu",
"RC0062":"Sr Sarah Mayeta",
"RC0063":"Fr Samuel Ngoy",
"RC0064":"Fr Crinovic Simbove",
"RC0065":"Fr Yann Kabuya",
"RC0066":"Sr Melissa",
"RC0067":"Fr Ephraïm"
};

let currentCode = "";

// Charger invité
function chargerInvite(){
  const code = document.getElementById("matricule").value.trim().toUpperCase();
  currentCode = code;
  const nom = invites[code];
  const statusDiv = document.getElementById("status");
  
  if(nom){
    document.getElementById("nom").innerHTML = `<span style="color:#facc15">${nom}</span>`;
    statusDiv.innerHTML = `<span class="success">✅ Code valide : ${code}</span>`;
    statusDiv.className = "success";
  } else {
    document.getElementById("nom").innerHTML = "Invité non trouvé";
    statusDiv.innerHTML = `<span class="error">❌ Code invalide : ${code || "code manquant"}</span>`;
    statusDiv.className = "error";
  }
}

// Générer QR personnel
function genererMonQR(){
  const box = document.getElementById("qrBox");
  const statusDiv = document.getElementById("status");
  box.innerHTML = "";

  if(!currentCode || !invites[currentCode]){
    statusDiv.innerHTML = "<span class='error'>❌ Veuillez d'abord entrer un code valide</span>";
    statusDiv.className = "error";
    return;
  }

  try{
    const qrData = `${BASE_URL}?code=${currentCode}`;
    
    new QRCode(box, {
      text: qrData,
      width: 200,
      height: 200,
      colorDark: "#000000",
      colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.H
    });
    
    statusDiv.innerHTML = `<span class="success">✅ QR code généré pour ${invites[currentCode]}</span>`;
    statusDiv.className = "success";
  } catch(error){
    statusDiv.innerHTML = "<span class='error'>❌ Erreur lors de la génération du QR code</span>";
    statusDiv.className = "error";
  }
}

// Générer tous les QR (admin)
function generateAllQR(){
  const container = document.getElementById("qrcodeList");
  const statusDiv = document.getElementById("status");
  container.innerHTML = "";
  
  statusDiv.innerHTML = "<span class='success'>⏳ Génération des 67 QR codes en cours...</span>";
  
  setTimeout(() => {
    Object.keys(invites).forEach((code, index) => {
      const div = document.createElement("div");
      div.className = "qr-box";

      const label = document.createElement("div");
      label.innerText = `${code} - ${invites[code]}`;
      label.style.fontSize = "11px";
      label.style.marginBottom = "8px";
      label.style.wordBreak = "break-word";

      const qrContainer = document.createElement("div");
      
      try{
        new QRCode(qrContainer, {
          text: `${BASE_URL}?code=${code}`,
          width: 130,
          height: 130,
          colorDark: "#000000",
          colorLight: "#ffffff",
          correctLevel: QRCode.CorrectLevel.H
        });
      } catch(error){
        qrContainer.innerHTML = "<p style='color:red;font-size:10px'>Erreur</p>";
      }

      div.appendChild(label);
      div.appendChild(qrContainer);
      container.appendChild(div);
    });
    
    statusDiv.innerHTML = `<span class="success">✅ ${Object.keys(invites).length} QR codes générés avec succès !</span>`;
  }, 100);
}

// Vérifier si un code est passé dans l'URL
window.addEventListener('load', () => {
  const urlParams = new URLSearchParams(window.location.search);
  const codeFromUrl = urlParams.get('code');
  if(codeFromUrl && invites[codeFromUrl]){
    document.getElementById("matricule").value = codeFromUrl;
    chargerInvite();
    genererMonQR();
  }
});
</script>

</body>
</html>
