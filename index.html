<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:system-ui, -apple-system, Segoe UI, Roboto;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#0b1220,#1e293b,#0f172a);
  color:#fff;
  padding:15px;
}

.card{
  width:100%;
  max-width:780px;
  background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.12);
  backdrop-filter:blur(16px);
  border-radius:20px;
  padding:22px;
  text-align:center;
}

h1{
  color:#facc15;
  font-size:22px;
  margin-bottom:10px;
}

.nom{
  font-size:18px;
  font-weight:700;
  margin:15px 0;
}

.message{
  text-align:justify;
  line-height:1.7;
  color:#e2e8f0;
  font-size:14px;
}

.info{
  margin-top:18px;
  display:flex;
  flex-direction:column;
  gap:8px;
}

.box{
  background:rgba(255,255,255,0.08);
  padding:10px;
  border-radius:10px;
  font-size:14px;
}

  margin-top:20px;
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#facc15;
  font-weight:bold;
  font-size:15px;
  cursor:pointer;
}

#status{
  margin-top:12px;
  font-size:14px;
}

.error{ color:#f87171; }
.success{ color:#86efac; }

/* QR LIST */
#qrcodeList{
  margin-top:20px;
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
}

.qr-box{
  background:rgba(255,255,255,0.06);
  padding:10px;
  border-radius:12px;
  width:160px;
}
</style>

</head>

<body>

<div class="card">

<h1>🎟️ Invitation Officielle</h1>

<div class="nom">
Cher(e) <span id="nom">Chargement...</span>
</div>

<div class="message">
La Jeunesse Pour Christ de l’Église MERI / Paroisse Grain de Senevé
vous convie à un moment de rafraîchissement, d’échange de cadeaux et de communion fraternelle.
</div>

<div class="info">
<div class="box">📅 Dimanche 14 Juin 2026</div>
<div class="box">📍 Restaurant LACAZZA</div>
<div class="box">⏰ 15h00</div>
</div>

<button onclick="confirmer()">✔ Confirmer ma présence</button>

<div id="status"></div>

<!-- 🔥 GENERATION QR -->
<button onclick="generateAllQR()">🎟️ Générer tous les QR (67 invités)</button>

<div id="qrcodeList"></div>

</div>

/* CONFIRMATION */
window.confirmer = async function(){

  const code = new URLSearchParams(window.location.search).get("code");
  const nomFinal = invites[code];
  const status = document.getElementById("status");

  if(!code || !nomFinal){
    status.innerHTML = "<span class='error'>Code invalide</span>";
    return;
  }

  try{
    await setDoc(doc(db, "invites", code), {
      nom: nomFinal,
      statut: "present",
      date: new Date().toISOString()
    });

    status.innerHTML = "<span class='success'>✔ Présence enregistrée</span>";

  }catch(e){
    status.innerHTML = "<span class='error'>Erreur Firebase</span>";
  }
};

/* QR GENERATION */
window.generateAllQR = function(){

  const container = document.getElementById("qrcodeList");
  container.innerHTML = "";

  const baseURL = "https://gamaliel008.github.io/Invitations_qrcode_meri/index.html";

  Object.keys(invites).forEach((code) => {

    const box = document.createElement("div");
    box.className = "qr-box";

    const label = document.createElement("div");
    label.style.fontSize = "12px";
    label.innerText = code + " - " + invites[code];

    const qr = document.createElement("div");

    new QRCode(qr, {
      text: `${baseURL}?code=${code}`,
      width:140,
      height:140
    });

    box.appendChild(label);
    box.appendChild(qr);

    container.appendChild(box);
  });
};

</script>
