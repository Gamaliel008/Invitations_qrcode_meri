<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Invitation QR - JPC MERI</title>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:system-ui, -apple-system, Segoe UI, Roboto;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#0b1220,#1e293b,#0f172a);
  color:#fff;
  padding:15px;
}

.card{
  width:100%;
  max-width:780px;
  background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.12);
  backdrop-filter:blur(16px);
  border-radius:20px;
  padding:22px;
  text-align:center;
}

h1{
  color:#facc15;
  font-size:22px;
  margin-bottom:10px;
}

.nom{
  font-size:18px;
  font-weight:700;
  margin:15px 0;
}

input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  margin-top:10px;
}

.message{
  text-align:justify;
  line-height:1.7;
  color:#e2e8f0;
  font-size:14px;
}

.info{
  margin-top:18px;
  display:flex;
  flex-direction:column;
  gap:8px;
}

.box{
  background:rgba(255,255,255,0.08);
  padding:10px;
  border-radius:10px;
  font-size:14px;
}

button{
  margin-top:12px;
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#facc15;
  font-weight:bold;
  font-size:15px;
  cursor:pointer;
}

#status{
  margin-top:12px;
  font-size:14px;
}

.error{ color:#f87171; }
.success{ color:#86efac; }

#qrBox{
  margin-top:20px;
  display:flex;
  justify-content:center;
}

#qrcodeList{
  margin-top:20px;
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
}

.qr-box{
  background:rgba(255,255,255,0.06);
  padding:10px;
  border-radius:12px;
  width:160px;
}
</style>

</head>

<body>

<div class="card">

<h1>🎟️ Invitation Officielle</h1>

<!-- INPUT -->
<input id="matricule" placeholder="Ex: RC0001">

<button onclick="chargerInvite()">🔎 Charger mon invitation</button>

<div class="nom">
Cher(e) <span id="nom">...</span>
</div>

<div class="message">
La Jeunesse Pour Christ de l’Église MERI / Paroisse Grain de Senevé
vous convie à un moment de rafraîchissement, d’échange de cadeaux et de communion fraternelle.
</div>

<div class="info">
<div class="box">📅 Dimanche 14 Juin 2026</div>
<div class="box">📍 Restaurant LACAZZA</div>
<div class="box">⏰ 15h00</div>
</div>

<!-- QR PERSONNEL -->
<button onclick="genererMonQR()">🎟️ Générer mon QR</button>
<div id="qrBox"></div>

<div id="status"></div>

<hr style="margin:20px 0; opacity:0.2;">

<!-- QR ADMIN -->
<button onclick="generateAllQR()">🎟️ Générer tous les QR (67 invités)</button>
<div id="qrcodeList"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>

<script>

};

let currentCode = "";

/* charger invité */
function chargerInvite(){
  const code = document.getElementById("matricule").value.trim();
  currentCode = code;
  document.getElementById("nom").innerText = invites[code] || "Invité inconnu";
}

/* QR personnel centré */
function genererMonQR(){

  const box = document.getElementById("qrBox");
  box.innerHTML = "";

  if(!currentCode || !invites[currentCode]){
    box.innerHTML = "<span style='color:red'>Code invalide</span>";
    return;
  }

  const baseURL = "https://gamaliel008.github.io/Invitations_qrcode_meri/index.html";

  new QRCode(box, {
    text: `${baseURL}?code=${currentCode}`,
    width: 200,
    height: 200
  });
}

/* QR admin */
function generateAllQR(){

  const container = document.getElementById("qrcodeList");
  container.innerHTML = "";

  const baseURL = "https://gamaliel008.github.io/Invitations_qrcode_meri/index.html";

  Object.keys(invites).forEach(code => {

    const div = document.createElement("div");
    div.className = "qr-box";

    const label = document.createElement("div");
    label.innerText = code + " - " + invites[code];
    label.style.fontSize = "12px";

    const qr = document.createElement("div");

    new QRCode(qr, {
      text: `${baseURL}?code=${code}`,
      width:140,
      height:140
    });

    div.appendChild(label);
    div.appendChild(qr);

    container.appendChild(div);
  });
}
</script>

</body>
</html>
