<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scanner QR</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
  margin:0;
  background:#0f172a;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:Arial;
}

.box{
  width:90%;
  max-width:500px;
  text-align:center;
}

#reader{
  width:100%;
  border-radius:15px;
  overflow:hidden;
}
</style>
</head>

<body>

<div class="box">
<h2>📲 Scan QR Invitation</h2>
<div id="reader"></div>
<p id="result">En attente du scan...</p>
</div>

<script>
function onScanSuccess(decodedText) {
    document.getElementById("result").innerText = "✔ Scanné : " + decodedText;

    // redirection automatique vers ton site
    window.location.href = decodedText;
}

const scanner = new Html5QrcodeScanner("reader", {
    fps: 10,
    qrbox: 250
});

scanner.render(onScanSuccess);
</script>

</body>
</html>
